<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft Yahei", Arial, sans-serif;
    font-size: 15px; color: #1F2329; background: #fff;
    padding: 48px 56px 60px; max-width: 820px; line-height: 1.8;
  }

  /* Cover */
  .cover-tag { font-size: 11px; font-weight: 700; color: #3370FF; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .cover-title { font-size: 28px; font-weight: 800; color: #1F2329; line-height: 1.25; margin-bottom: 14px; }
  .cover-lead { font-size: 15px; color: #646A73; line-height: 1.8; margin-bottom: 20px; border-left: 3px solid #3370FF; padding-left: 16px; }
  .cover-meta { font-size: 12px; color: #8F959E; display: flex; gap: 20px; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid #F0F1F3; }

  /* TOC */
  .toc { background: #F7F8FA; border-radius: 8px; padding: 16px 20px; margin-bottom: 36px; }
  .toc-title { font-size: 11px; font-weight: 700; color: #8F959E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .toc-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .toc-item { font-size: 13px; color: #3370FF; display: flex; gap: 8px; align-items: baseline; }
  .toc-num { font-size: 11px; font-weight: 700; color: #8F959E; min-width: 20px; }

  /* Article sections */
  .article-section { margin-bottom: 36px; }
  .section-heading {
    font-size: 18px; font-weight: 700; color: #1F2329;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 2px solid #3370FF; display: flex; align-items: center; gap: 10px;
  }
  .section-num {
    width: 28px; height: 28px; border-radius: 6px; background: #3370FF; color: #fff;
    font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .section-body { font-size: 14px; color: #3D3D3D; line-height: 1.85; }
  .section-body p + p { margin-top: 12px; }

  /* Callout / highlight box */
  .callout {
    background: #F0F4FF; border-left: 4px solid #3370FF; border-radius: 0 8px 8px 0;
    padding: 14px 18px; margin: 16px 0; font-size: 14px; color: #2B5FD9; line-height: 1.7;
  }
  .callout-warn { background: #FFF8E6; border-left-color: #FF8800; color: #7A5800; }
  .callout-success { background: #F0FFF4; border-left-color: #27C346; color: #1A8A2E; }

  /* Key points */
  .keypoints { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
  .keypoint { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: #3D3D3D; }
  .kp-dot { width: 8px; height: 8px; border-radius: 50%; background: #3370FF; flex-shrink: 0; margin-top: 7px; }

  /* Quote */
  .blockquote {
    border-left: 3px solid #E8EAED; padding: 10px 18px; margin: 16px 0;
    font-size: 14px; color: #646A73; font-style: italic; line-height: 1.75;
  }

  /* Summary box */
  .summary-box {
    background: #1F2329; border-radius: 10px; padding: 24px 28px; margin-top: 36px;
  }
  .summary-box .sum-title { font-size: 13px; font-weight: 700; color: #8F959E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .summary-box .sum-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .summary-box .sum-num { font-size: 12px; font-weight: 700; color: #3370FF; min-width: 20px; }
  .summary-box .sum-text { font-size: 14px; color: #E8EAED; line-height: 1.65; }

  .doc-footer { margin-top: 32px; font-size: 11px; color: #C2C7CF; text-align: right; }
</style>
</head>
<body>

<div class="cover-tag">{{category}}</div>
<div class="cover-title">{{title}}</div>
<div class="cover-lead">{{lead}}</div>
<div class="cover-meta">
  <span>📅 {{date}}</span>
  <span>👤 {{author}}</span>
  <span>⏱ 阅读约 {{read_time}}</span>
</div>

<!-- 目录 -->
<div class="toc">
  <div class="toc-title">目录</div>
  <ul class="toc-list">{{toc_items}}</ul>
</div>

<!-- 正文 -->
{{sections}}

<!-- 核心结论 -->
<div class="summary-box">
  <div class="sum-title">核心结论</div>
  {{key_takeaways}}
</div>

<div class="doc-footer">{{author}} · {{date}}</div>

</body>
</html>
