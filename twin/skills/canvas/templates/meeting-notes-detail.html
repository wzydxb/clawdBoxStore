<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft Yahei", Arial, sans-serif;
    font-size: 14px;
    color: #1F2329;
    background: #fff;
    padding: 40px 44px 52px;
    max-width: 900px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .doc-title { font-size: 22px; font-weight: 700; color: #1F2329; margin-bottom: 6px; }
  .doc-subtitle { font-size: 13px; color: #8F959E; margin-bottom: 24px; line-height: 1.5; }

  .meta-row {
    display: flex; gap: 24px; align-items: flex-start;
    margin-bottom: 28px; padding: 14px 18px;
    background: #F7F8FA; border-radius: 8px; font-size: 13px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-key { font-size: 11px; color: #8F959E; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-val { color: #1F2329; }
  .participant-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .ptag { background: #fff; border: 1px solid #E8EAED; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #3D3D3D; }

  /* ── Section label ── */
  .section-label {
    font-size: 12px; font-weight: 600; color: #8F959E;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: #F0F1F3; }

  /* ── Topic cards ── */
  .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .card { border: 1px solid #E8EAED; border-radius: 10px; padding: 16px 18px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 13px; font-weight: 600; color: #1F2329; display: flex; align-items: center; gap: 6px; }
  .card-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .badge-red    { background: #FFECEC; color: #C0392B; }
  .badge-blue   { background: #E8F0FF; color: #2B5FD9; }
  .badge-green  { background: #E8F8EE; color: #1A8A2E; }
  .badge-orange { background: #FFF3E0; color: #A05A00; }
  .badge-purple { background: #F3EEFF; color: #6B3FA0; }
  .badge-gray   { background: #F2F3F5; color: #646A73; }
  .card-red    { border-top: 3px solid #F54A45; }
  .card-blue   { border-top: 3px solid #3370FF; }
  .card-green  { border-top: 3px solid #27C346; }
  .card-orange { border-top: 3px solid #FF8800; }
  .card-purple { border-top: 3px solid #8B5CF6; }
  .card-teal   { border-top: 3px solid #0EA5A0; }
  .card-desc { font-size: 13px; font-weight: 500; color: #1F2329; margin-bottom: 10px; line-height: 1.5; }
  .card-points { list-style: none; }
  .card-points li { font-size: 12.5px; color: #3D3D3D; padding: 3px 0 3px 12px; position: relative; line-height: 1.55; }
  .card-points li::before { content: "•"; position: absolute; left: 0; color: #C2C7CF; }

  /* ── Chapter timeline ── */
  .chapter-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 28px; }
  .chapter-item { display: flex; gap: 0; }
  .chapter-left {
    display: flex; flex-direction: column; align-items: center;
    width: 80px; flex-shrink: 0; padding-top: 2px;
  }
  .chapter-time {
    font-size: 12px; font-weight: 600; color: #3370FF;
    background: #EEF3FF; border-radius: 4px;
    padding: 2px 7px; white-space: nowrap;
  }
  .chapter-line { flex: 1; width: 1px; background: #E8EAED; margin: 6px 0; }
  .chapter-item:last-child .chapter-line { display: none; }
  .chapter-body {
    flex: 1; padding: 0 0 20px 16px;
    border-left: 1px solid #F0F1F3;
    margin-left: -1px;
  }
  .chapter-title { font-size: 14px; font-weight: 500; color: #1F2329; margin-bottom: 6px; }
  .chapter-summary {
    font-size: 13px; color: #646A73; line-height: 1.65;
    background: #F7F8FA; border-radius: 6px;
    padding: 10px 14px;
  }

  /* ── Todos ── */
  .todo-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 28px; }
  .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border: 1px solid #EBEDF0; border-radius: 7px; font-size: 13px; }
  .todo-check { width: 15px; height: 15px; border: 1.5px solid #C2C7CF; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
  .todo-text { flex: 1; color: #1F2329; }
  .todo-meta { display: flex; gap: 10px; font-size: 11px; color: #8F959E; margin-top: 2px; }
  .todo-owner::before { content: "👤 "; }
  .todo-deadline::before { content: "📅 "; }

  /* ── Summary bar ── */
  .summary-bar {
    background: #F0F4FF; border: 1px solid #D0DCFF; border-radius: 8px;
    padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: #1F2329; line-height: 1.6;
  }
  .summary-bar-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .doc-footer { margin-top: 28px; font-size: 11px; color: #C2C7CF; text-align: right; }
</style>
</head>
<body>

<div class="doc-title">{{title}}</div>
<div class="doc-subtitle">{{subtitle}}</div>

<div class="meta-row">
  <div class="meta-item">
    <span class="meta-key">时间</span>
    <span class="meta-val">{{date}} &nbsp;{{time_range}}</span>
  </div>
  <div class="meta-item">
    <span class="meta-key">地点</span>
    <span class="meta-val">{{location}}</span>
  </div>
  <div class="meta-item">
    <span class="meta-key">参会人</span>
    <div class="participant-tags">{{participants}}</div>
  </div>
</div>

<!-- 核心讨论事项 -->
<div class="section-label">核心讨论事项</div>
<div class="card-grid">{{topic_cards}}</div>

<!-- 会议过程 -->
<div class="section-label">会议过程</div>
<div class="chapter-list">{{chapters}}</div>

<!-- 待办 -->
<div class="section-label">待办</div>
<div class="todo-list">{{todos}}</div>

<!-- 核心方向 -->
<div class="summary-bar">
  <span class="summary-bar-icon">⭐</span>
  <span><strong>核心方向：</strong>{{core_direction}}</span>
</div>

<div class="doc-footer">飞书智能会议纪要 AI 生成 · {{generated_at}}</div>

</body>
</html>
